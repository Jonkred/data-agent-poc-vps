# docker-compose.yml — POC Data Agent VPS
# Perfis: core | rag | ai
#
# CREDENCIAIS (estudo):
#   Airflow:    admin / admin2024  → http://IP:8080
#   MinIO:      minioadmin / minio2024  → http://IP:9001
#   ClickHouse: poc_user / click2024  → http://IP:8123
#   FastAPI:    → http://IP:8000/docs

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW__WEBSERVER__SECRET_KEY}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
  volumes:
    - ../../dags:/opt/airflow/dags
    - ../../src:/opt/airflow/src
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - poc-net
  restart: unless-stopped

services:

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - poc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
    profiles: [core]

  # Roda uma vez para migrar o DB e criar o usuário admin.
  # Usa exec-form no command (sem override de entrypoint) para evitar
  # o bug de shell duplo (/bin/bash -c /bin/sh -c ...).
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - "airflow db init && (airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@poc.local --password admin2024 || true)"
    restart: "no"
    profiles: [core]

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
    profiles: [core]

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
    profiles: [core]

  minio:
    image: minio/minio:latest
    env_file: .env
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - poc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768m
    restart: unless-stopped
    profiles: [core]

  # Healthcheck usa clickhouse-client (não wget) pois a imagem Alpine
  # pode não ter wget disponível.
  clickhouse:
    image: clickhouse/clickhouse-server:24.5-alpine
    env_file: .env
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DB}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/memory.xml:ro
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.d/poc_user.xml:ro
    ports:
      - "8123:8123"
      - "9100:9000"
    networks:
      - poc-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user=poc_user", "--password=click2024", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3g
    restart: unless-stopped
    profiles: [core]

  # api.py é montado via volume de src/agent_tools — não inline no YAML.
  # Isso evita o bug de YAML scalar que ocorre com código Python embutido.
  fastapi:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../src/agent_tools:/app
    entrypoint: ["bash", "-c"]
    command: "pip install fastapi uvicorn --quiet && uvicorn api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    networks:
      - poc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped
    profiles: [core]

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - poc-net
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
    profiles: [rag]

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - poc-net
    deploy:
      resources:
        limits:
          memory: 4g
    restart: unless-stopped
    profiles: [ai]

volumes:
  postgres-data:
  airflow-logs:
  airflow-plugins:
  minio-data:
  clickhouse-data:
  qdrant-data:
  ollama-models:

networks:
  poc-net:
    driver: bridge
